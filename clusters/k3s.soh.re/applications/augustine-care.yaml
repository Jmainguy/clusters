apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: augustine-care
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/jmainguy/helm-charts
    targetRevision: main
    path: redirect
    helm:
      releaseName: augustine-care
      values: |
        name: augustine-care
        virtualService:
          hosts:
            - augustine.care
            - www.augustine.care
        redirect:
          authority: ahhc.org
          scheme: https
          redirectCode: 301
  destination:
    name: k3s.soh.re
    namespace: augustine-care
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
    - CreateNamespace=true
    - ServerSideApply=true
