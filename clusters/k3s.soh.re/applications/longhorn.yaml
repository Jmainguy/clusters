apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: longhorn
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/Standouthost/helm-charts
    targetRevision: main
    path: longhorn
  destination:
    name: k3s.soh.re
    namespace: longhorn
  syncPolicy:
    syncOptions:
    - CreateNamespace=true
    - ServerSideApply=true

